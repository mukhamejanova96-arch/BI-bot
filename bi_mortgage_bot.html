<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI Ипотека</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --b:#0057A8;--bd:#003E7E;--bl:#EBF3FF;--w:#fff;
  --g:#F6F8FB;--brd:#E2EAF4;--tx:#0D2140;--mt:#6B84A0;--dm:#A8BFCF;
  --gr:#16A05A;--grb:#E7F6EE;--am:#C47A00;--amb:#FFF4DC;
  --r:16px;
}
body{font-family:'Inter',system-ui,sans-serif;background:#EEF3FA;
  display:flex;align-items:flex-end;justify-content:flex-end;
  min-height:100vh;padding:24px}

/* ── Widget ── */
.widget{
  width:360px;border-radius:var(--r);overflow:hidden;
  border:1px solid var(--brd);background:var(--w);
  box-shadow:0 4px 32px rgba(0,87,168,.12);
  display:flex;flex-direction:column;
}

/* Header */
.head{background:var(--b);padding:12px 14px;display:flex;align-items:center;gap:10px}
.h-av{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.h-av i{color:#fff;font-size:17px}
.h-info{flex:1}
.h-info strong{color:#fff;font-size:13px;font-weight:600;display:block}
.h-info span{color:rgba(255,255,255,.6);font-size:11px}
.h-live{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.7)}
.dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;
  animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* Step pills */
.steps{display:flex;gap:5px;padding:9px 12px;background:var(--g);
  border-bottom:1px solid var(--brd);overflow-x:auto;scrollbar-width:none}
.steps::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:3px 10px;border-radius:20px;font-size:11px;
  font-weight:500;cursor:pointer;border:1px solid var(--brd);
  background:var(--w);color:var(--mt);transition:all .15s;white-space:nowrap}
.stab:hover{border-color:var(--b);color:var(--b)}
.stab.on{background:var(--b);color:#fff;border-color:var(--b)}
.stab.ok{background:var(--grb);color:var(--gr);border-color:rgba(22,160,90,.3)}

/* Messages */
.msgs{padding:12px;display:flex;flex-direction:column;gap:9px;
  min-height:260px;max-height:260px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}

.m{display:flex;gap:6px;max-width:92%}
.m.u{align-self:flex-end;flex-direction:row-reverse}
.m.b{align-self:flex-start}
.av{width:22px;height:22px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-top:2px}
.m.b .av{background:var(--bl)}
.m.b .av i{color:var(--b);font-size:11px}
.m.u .av{background:var(--b)}
.m.u .av i{color:#fff;font-size:11px}
.bb{padding:8px 11px;font-size:12.5px;line-height:1.5;border-radius:12px}
.m.b .bb{background:var(--g);border:1px solid var(--brd);
  color:var(--tx);border-top-left-radius:3px}
.m.u .bb{background:var(--b);color:#fff;border-top-right-radius:3px}

/* Info strip & chips */
.strip{margin-left:28px;background:var(--bl);border-radius:7px;
  padding:6px 9px;display:flex;gap:6px;align-items:flex-start}
.strip i{color:var(--b);font-size:12px;flex-shrink:0;margin-top:1px}
.strip p{font-size:11px;color:var(--bd);line-height:1.4}
.strip.nav{cursor:pointer}
.strip.nav p{color:var(--b);font-weight:500}

.chips{display:flex;flex-wrap:wrap;gap:4px;margin-left:28px}
.ch{font-size:11px;padding:3px 9px;border:1px solid var(--brd);
  border-radius:20px;background:var(--w);color:var(--b);
  cursor:pointer;font-family:inherit;transition:all .12s}
.ch:hover{background:var(--bl);border-color:var(--b)}

/* Typing */
.typing{display:none;padding:0 12px 6px;margin-left:28px}
.dots{display:flex;gap:3px}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--dm);
  animation:pulse 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{opacity:.2}30%{opacity:1}}

/* Input */
.inp-row{display:flex;gap:7px;padding:10px 12px;
  border-top:1px solid var(--brd);background:var(--w)}
.inp{flex:1;padding:8px 12px;font-size:12.5px;
  border:1px solid var(--brd);border-radius:20px;
  color:var(--tx);outline:none;font-family:inherit;
  background:var(--g);transition:border-color .15s}
.inp:focus{border-color:var(--b);background:#fff}
.inp::placeholder{color:var(--dm)}
.snd{width:32px;height:32px;border-radius:50%;background:var(--b);
  border:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:background .12s}
.snd:hover{background:var(--bd)}
.snd i{color:#fff;font-size:13px}
.snd:disabled{background:var(--dm);cursor:default}

/* Footer */
.foot{padding:6px 12px;text-align:center;font-size:10px;
  color:var(--mt);background:var(--g);border-top:1px solid var(--brd);
  letter-spacing:.3px}

/* Error banner */
.err-banner{display:none;background:#FFF4DC;border-bottom:1px solid #F5D78A;
  padding:8px 14px;font-size:11px;color:#8a5800;text-align:center}
</style>
</head>
<body>

<div class="widget">
  <div class="head">
    <div class="h-av"><i class="ti ti-building-skyscraper"></i></div>
    <div class="h-info">
      <strong id="hTitle">BI Ипотека</strong>
      <span id="hSub">Загрузка...</span>
    </div>
    <div class="h-live"><div class="dot"></div>онлайн</div>
  </div>

  <div class="err-banner" id="errBanner">
    ⚠ Не удалось загрузить data.json. Убедитесь что файл рядом с ботом.
  </div>

  <div class="steps" id="stepsBar"></div>
  <div class="msgs" id="msgs"></div>
  <div class="typing" id="typing"><div class="dots"><span></span><span></span><span></span></div></div>

  <div class="inp-row">
    <input class="inp" id="inp" placeholder="Напишите вопрос..." onkeydown="if(event.key==='Enter')send()" />
    <button class="snd" id="sbtn" onclick="send()" title="Отправить"><i class="ti ti-send"></i></button>
  </div>
  <div class="foot" id="foot">Powered by BI Group AI</div>
</div>

<script>
// ═══════════════════════════════════════════
//  НАСТРОЙКИ — вставьте ваш API ключ
// ═══════════════════════════════════════════
const API_KEY = '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';
const DATA_URL = 'data.json'; // путь к файлу данных

// ═══════════════════════════════════════════
let DATA = null;
let hist = [], cur = 0;

// Загружаем data.json при старте
async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?v=' + Date.now());
    DATA = await r.json();
    init();
  } catch(e) {
    document.getElementById('errBanner').style.display = 'block';
    document.getElementById('hSub').textContent = 'Ошибка загрузки';
    // Фолбек — минимальный режим без данных
    DATA = { programs:[], rate_matrix:[], faq:[], steps:[
      {id:0,label:'Консультант',greeting:'Сәлем! Чем могу помочь по ипотеке?',
       hint:'Файл data.json не загружен.',chips:['Программы','Расчёт ипотеки']}
    ], meta:{company:'BI Group',city:'Астана',contact:'bi.group'}};
    init();
  }
}

function init() {
  const m = DATA.meta;
  document.getElementById('hSub').textContent = m.company + ' · ' + m.city;
  document.getElementById('foot').textContent = 'Powered by ' + m.company + ' AI';

  // Рисуем шаги
  const bar = document.getElementById('stepsBar');
  bar.innerHTML = '';
  DATA.steps.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'stab' + (i === 0 ? ' on' : '');
    d.textContent = s.label;
    d.onclick = () => goStep(i);
    d.id = 'st' + i;
    bar.appendChild(d);
  });

  goStep(0);
}

// Строим system prompt из data.json
function buildSystem() {
  const m = DATA.meta;
  let sys = `Ты — AI ипотечный брокер ${m.company} (Казахстан). Помогаешь клиентам оформить ипотеку.
Отвечай КРАТКО: 2-3 предложения. Давай конкретный следующий шаг. Язык = язык клиента.\n\n`;

  sys += `ИПОТЕЧНЫЕ ПРОГРАММЫ:\n`;
  DATA.programs.forEach(p => {
    sys += `- ${p.name}: ставка ${p.rate_label}, ${p.conditions}\n  Кто подходит: ${p.who}\n`;
  });

  sys += `\nМАТРИЦА СТАВОК (взнос% / срок лет → ставка%):\n`;
  DATA.rate_matrix.forEach(r => {
    sys += `Взнос ${r.down_min}-${r.down_max}%, срок ${r.term_min}-${r.term_max} лет → ${r.rate}%\n`;
  });

  sys += `\nРАСЧЁТ ПЛАТЕЖА: M=P*(r*(1+r)^n)/((1+r)^n-1), r=ставка/12/100, n=месяцы. Суммы в ₸.\n`;
  sys += `Когда клиент даёт сумму и взнос — сначала определи ставку по матрице, потом считай платёж.\n`;

  sys += `\nЧАСТЫЕ ВОПРОСЫ:\n`;
  DATA.faq.forEach(f => { sys += `В: ${f.q}\nО: ${f.a}\n`; });

  return sys;
}

function goStep(i) {
  cur = i;
  DATA.steps.forEach((_, j) => {
    const el = document.getElementById('st' + j);
    if (!el) return;
    el.classList.remove('on', 'ok');
    if (j === i) el.classList.add('on');
    else if (j < i) el.classList.add('ok');
  });
  const s = DATA.steps[i];
  const box = document.getElementById('msgs');
  box.innerHTML = '';
  addBot(s.greeting);
  addStrip(s.hint, false);
  addChips(s.chips);
}

function addBot(txt) {
  const box = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'm b';
  d.innerHTML = `<div class="av"><i class="ti ti-building-bank"></i></div>
    <div><div class="bb">${txt.replace(/\n/g,'<br>')}</div></div>`;
  box.appendChild(d); box.scrollTop = 9999;
}

function addUser(txt) {
  const box = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'm u';
  d.innerHTML = `<div class="av"><i class="ti ti-user"></i></div>
    <div><div class="bb">${txt}</div></div>`;
  box.appendChild(d); box.scrollTop = 9999;
}

function addStrip(txt, isNav, stepIdx) {
  const box = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'strip' + (isNav ? ' nav' : '');
  const icon = isNav ? 'ti-arrow-right' : 'ti-info-circle';
  d.innerHTML = `<i class="ti ${icon}"></i><p>${txt}</p>`;
  if (isNav && stepIdx !== undefined) d.onclick = () => goStep(stepIdx);
  box.appendChild(d); box.scrollTop = 9999;
}

function addChips(arr) {
  const box = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'chips';
  arr.forEach(t => {
    const b = document.createElement('button');
    b.className = 'ch'; b.textContent = t;
    b.onclick = () => sq(t);
    d.appendChild(b);
  });
  box.appendChild(d); box.scrollTop = 9999;
}

async function send() {
  const el = document.getElementById('inp');
  const t = el.value.trim(); if (!t) return;
  el.value = ''; addUser(t); await reply(t);
}
function sq(t) { addUser(t); reply(t); }

async function reply(txt) {
  const btn = document.getElementById('sbtn');
  const typ = document.getElementById('typing');
  const box = document.getElementById('msgs');
  btn.disabled = true; typ.style.display = 'block'; box.scrollTop = 9999;

  const stepLabel = DATA.steps[cur] ? DATA.steps[cur].label : '';
  hist.push({ role: 'user', content: `[Шаг: ${stepLabel}] ${txt}` });

  try {
    const r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`,
        'HTTP-Referer': 'https://mukhamejanova96-arch.github.io',
        'X-Title': 'BI Mortgage Bot'
      },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout:free',
        messages: [
          { role: 'system', content: buildSystem() },
          ...hist
        ]
      })
    });
    const data = await r.json();
    const ans = data.choices?.[0]?.message?.content || 'Ошибка, попробуйте снова.';
    hist.push({ role: 'assistant', content: ans });
    typ.style.display = 'none';
    addBot(ans);
    const nextIdx = cur + 1;
    if (nextIdx < DATA.steps.length) {
      addStrip('Далее: ' + DATA.steps[nextIdx].label + ' →', true, nextIdx);
    }
  } catch(e) {
    typ.style.display = 'none';
    addBot('Ошибка: ' + e.message);
    console.error('API Error:', e);
  }
  btn.disabled = false;
}

loadData();
</script>
</body>
</html>
